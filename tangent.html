<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Tangent — Personal Edition</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --bg:#0b1f16; --panel:#12291e; --panel2:#1a3a2a; --row:#080d0a; --line:#20452f;
  --txt:#eef7f0; --dim:#8fae9c; --teal:#41e3bb; --yellow:#d9f452; --red:#ff7a6b; --blue:#5ab4ff;
  --hud:rgba(8,18,11,.80); --hudline:rgba(217,244,82,.70);
  --st:env(safe-area-inset-top,0px); --sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:16px;overscroll-behavior:none;user-select:none}
#app{display:flex;flex-direction:column;height:100dvh}
main{flex:1;overflow-y:auto;padding:calc(14px + var(--st)) 14px 110px}
h1.title{font-size:34px;font-weight:800;text-align:center;margin:6px 0 14px}
.card{background:var(--panel);border-radius:20px;padding:16px;margin-bottom:12px}
.rowcard{background:var(--row);border-radius:18px;padding:16px;margin-bottom:10px;cursor:pointer}
.row{display:flex;align-items:center;gap:10px}
.grow{flex:1}
.dim{color:var(--dim)}.teal{color:var(--teal)}.yellow{color:var(--yellow)}.red{color:var(--red)}
.small{font-size:13px}.mono{font-variant-numeric:tabular-nums}
.mt{margin-top:10px}.mb{margin-bottom:10px}.center{text-align:center}
.btn{background:var(--panel2);border:none;color:var(--txt);border-radius:14px;padding:13px 18px;font-size:16px;font-weight:700;cursor:pointer}
.btn.grad{background:linear-gradient(90deg,var(--teal),var(--yellow));color:#06231a}
.btn.ghostb{background:var(--panel);color:var(--teal)}
.btn.sm{padding:8px 12px;font-size:13px;border-radius:10px}
.btn:active{opacity:.75}
input,select,textarea{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:12px;padding:12px;font-size:16px;width:100%}
label.fl{display:block;font-size:12px;color:var(--dim);margin:10px 0 5px;text-transform:uppercase;letter-spacing:.6px;font-weight:700}
textarea{font-family:monospace;font-size:12px;min-height:90px}
/* pills / segmented */
.pillseg{display:inline-flex;background:#e8ede9;border-radius:999px;padding:3px}
.pillseg button{border:none;background:none;color:#233;font-size:16px;font-weight:700;padding:8px 22px;border-radius:999px;cursor:pointer}
.pillseg button.on{background:var(--yellow);color:#122}
.seg{display:flex;gap:6px}
.seg button{border:none;background:var(--panel2);color:var(--dim);font-size:14px;font-weight:700;padding:9px 16px;border-radius:999px;cursor:pointer}
.seg button.on{background:var(--yellow);color:#122}
.seg button.on.teal{background:var(--teal)}
.searchbox{display:flex;align-items:center;gap:8px;background:var(--panel);border-radius:14px;padding:0 12px;margin-bottom:12px}
.searchbox input{background:none;border:none;padding:13px 0}
.searchbox input:focus{outline:none}
/* toggle switch */
.switch{width:52px;height:30px;border-radius:999px;background:var(--panel2);position:relative;cursor:pointer;flex:0 0 auto}
.switch::after{content:"";position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#5a7466;transition:all .15s}
.switch.on{background:var(--teal)}
.switch.on::after{left:25px;background:#fff}
/* stepper */
.stepper{display:flex;align-items:center;gap:14px}
.stepper button{width:38px;height:38px;border-radius:50%;border:none;background:var(--panel2);color:var(--txt);font-size:20px;font-weight:800;cursor:pointer}
.stepper b{font-size:22px;min-width:26px;text-align:center}
/* config rows */
.cfg{background:var(--panel);border-radius:20px;overflow:hidden;margin-bottom:12px}
.cfgrow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:16px;border-bottom:1px solid rgba(255,255,255,.05)}
.cfgrow:last-child{border-bottom:none}
.cfgrow .lbl{font-size:17px;font-weight:600}
.cfgrow .sub{font-size:13px;color:var(--dim);margin-top:2px}
/* chips */
.tag{display:inline-block;font-size:14px;font-weight:700;padding:6px 14px;border-radius:999px}
.tag.teal{background:var(--teal);color:#06231a}
.tag.yellow{background:var(--yellow);color:#232a06}
.tag.dark{background:var(--panel2);color:var(--dim)}
/* nav */
nav{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(10px + var(--sb));z-index:60;
  display:flex;align-items:center;gap:2px;background:rgba(10,22,15,.92);border:1px solid rgba(255,255,255,.06);
  border-radius:999px;padding:6px 10px;backdrop-filter:blur(10px)}
nav button{width:66px;border:none;background:none;color:var(--dim);font-size:11px;font-weight:600;padding:6px 0;cursor:pointer;border-radius:999px}
nav button .ic{display:block;font-size:21px;margin-bottom:1px}
nav button.on{color:var(--yellow)}
nav button.on .ic{filter:drop-shadow(0 0 6px rgba(217,244,82,.5))}
/* sheets */
#backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:90}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:100;background:var(--panel);border-radius:22px 22px 0 0;
  padding:14px 16px calc(22px + var(--sb));max-height:82dvh;overflow-y:auto;max-width:520px;margin:0 auto}
.grab{width:42px;height:4px;background:var(--line);border-radius:4px;margin:0 auto 12px}
.hidden{display:none !important}
/* full screen setup */
#setup{position:fixed;inset:0;z-index:70;background:var(--bg);overflow-y:auto;padding:calc(14px + var(--st)) 16px calc(30px + var(--sb))}
#setup .head{display:flex;align-items:center;margin-bottom:14px}
#setup .head .x{width:44px;height:44px;border-radius:50%;background:var(--panel);border:none;color:var(--txt);font-size:18px;cursor:pointer}
#setup .head h2{flex:1;text-align:center;font-size:24px;font-weight:800;margin-right:44px}
.playbar{display:flex;gap:12px;margin-top:16px}
.playbar .btn{flex:1;padding:16px;font-size:19px;border-radius:16px}
/* ============ hole screen (map) ============ */
#holeScreen{position:fixed;inset:0;z-index:80;background:#000}
#map{position:absolute;inset:0;background:#0b1f16}
.leaflet-container{background:#0b1f16}
.hudBtn{width:50px;height:50px;border-radius:16px;background:var(--hud);border:1.5px solid var(--hudline);
  color:#fff;font-size:21px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.4)}
#fcb{position:absolute;z-index:900;pointer-events:none;top:calc(12px + var(--st));left:12px;
  background:var(--hud);border:1.5px solid var(--hudline);border-radius:18px;padding:7px 15px;text-align:left;line-height:1.12}
#fcb .bf{color:#fff;font-size:21px;font-weight:700}#fcb .bf .u{font-size:13px;color:#cfd8bf;font-weight:600;margin-left:3px}
#fcb .c{color:var(--yellow);font-size:36px;font-weight:800}
#hcap{position:absolute;z-index:900;pointer-events:none;top:calc(120px + var(--st));left:16px;
  color:#fff;font-size:19px;font-weight:800;text-shadow:0 1px 4px rgba(0,0,0,.9)}
#closeHole{position:absolute;z-index:950;top:calc(12px + var(--st));right:12px}
#sideCol{position:absolute;z-index:950;right:12px;bottom:calc(180px + var(--sb));display:flex;flex-direction:column;gap:12px}
#clubPill{position:absolute;z-index:900;pointer-events:none;bottom:calc(84px + var(--sb));left:50%;transform:translateX(-50%);
  background:var(--hud);border:1.5px solid var(--hudline);border-radius:22px;padding:8px 30px;text-align:center;white-space:nowrap;max-width:80vw;
  align-items:center;gap:20px;justify-content:center}
#clubPill .club{font-size:30px;font-weight:800;color:var(--yellow);line-height:1.05}
#clubPill .opt{font-size:13px;font-weight:600;color:#e8ecdc}
#clubPill .altclub{font-size:24px;font-weight:800;color:rgba(255,255,255,.35)}
#chipRow{position:absolute;z-index:900;bottom:calc(12px + var(--sb));left:10px;right:10px;display:flex;gap:6px;justify-content:center;align-items:stretch}
.mchip{background:var(--hud);border:1.5px solid var(--hudline);border-radius:16px;padding:6px 13px;color:#fff;font-weight:800;font-size:17px;
  text-align:center;line-height:1.12;font-variant-numeric:tabular-nums;cursor:pointer;display:flex;flex-direction:column;justify-content:center}
.mchip small{display:block;font-weight:600;font-size:11px;color:#c9d4a3}
.mchip .yellow{color:var(--yellow)}
.arrowChip{font-size:20px;padding:6px 16px}
#toast{position:absolute;z-index:960;pointer-events:none;top:calc(12px + var(--st));left:50%;transform:translateX(-50%);
  background:var(--hud);border:1.5px solid var(--hudline);border-radius:14px;padding:9px 16px;font-size:14px;font-weight:700;color:#fff;
  max-width:60vw;text-align:center;transition:opacity .4s;opacity:0}
/* map markers */
.youDot{width:16px;height:16px;border-radius:50%;background:#4c9aff;border:3px solid #fff;box-shadow:0 0 8px rgba(0,0,0,.6)}
.teeDot{width:16px;height:16px;border-radius:50%;background:transparent;border:3.5px solid #fff;box-shadow:0 0 8px rgba(0,0,0,.6)}
.flagBadge{width:38px;height:38px;border-radius:12px;background:rgba(14,26,10,.6);border:2px solid var(--yellow);color:#fff;font-size:20px;
  display:flex;align-items:center;justify-content:center;transform:translate(-50%,-50%);box-shadow:0 0 8px rgba(0,0,0,.4)}
.greenLabel{color:#ffffffd9;font-size:11px;font-weight:800;text-shadow:0 1px 3px rgba(0,0,0,.9);text-align:center;line-height:14px}
.distChip{display:inline-block;transform:translate(-50%,-50%);background:var(--hud);color:#fff;font-size:16px;font-weight:800;
  padding:4px 13px;border-radius:14px;border:1.5px solid var(--hudline);white-space:nowrap;font-variant-numeric:tabular-nums}
.suggestChip{display:inline-flex;align-items:center;gap:8px;transform:translate(-50%,-50%);background:var(--hud);
  border:1.5px solid var(--hudline);border-radius:18px;padding:6px 15px;white-space:nowrap}
.suggestChip .ring{width:24px;height:24px;border-radius:50%;border:2.5px solid #fff;display:flex;align-items:center;justify-content:center}
.suggestChip .ring::after{content:"";width:7px;height:7px;border-radius:50%;background:#fff}
.suggestChip .txt{text-align:left;line-height:1.05}
.suggestChip .txt b{color:#fff;font-size:20px;font-weight:800;display:block}
.suggestChip .txt small{color:#e7efdb;font-size:12px;font-weight:600}
/* misc lists */
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{background:var(--panel2);border:1px solid var(--line);color:var(--dim);border-radius:999px;padding:8px 15px;font-size:14px;font-weight:700;cursor:pointer}
.chip.on{background:var(--yellow);border-color:var(--yellow);color:#232a06}
.shot{display:flex;align-items:center;gap:8px;padding:8px 2px;border-bottom:1px solid rgba(255,255,255,.06);font-size:15px}
.shot .n{width:20px;color:var(--dim);font-weight:700}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;background:var(--panel2);color:var(--dim);text-transform:uppercase}
.sg{margin-left:auto;font-weight:700;font-size:13px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.stat{background:var(--panel2);border-radius:12px;padding:10px;text-align:center}
.stat .v{font-size:20px;font-weight:800}
.stat .l{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.scoregrid{display:grid;grid-template-columns:repeat(9,1fr);gap:3px;font-size:11px;text-align:center}
.scoregrid .h{color:var(--dim)}
.scoregrid .s{background:var(--panel2);border-radius:6px;padding:6px 0;font-weight:700;cursor:pointer}
.scoregrid .s.birdie{color:var(--teal)}
.scoregrid .s.bogey{color:var(--yellow)}
.scoregrid .s.dbl{color:var(--red)}
.bar{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:13px}
.bar .l{width:78px;color:var(--dim)}
.bar .track{flex:1;height:16px;position:relative;background:var(--panel2);border-radius:8px;overflow:hidden}
.bar .fill{position:absolute;top:0;bottom:0}
.bar .v{width:44px;text-align:right;font-weight:700}
.big{font-size:34px;font-weight:800}
#markStack{position:absolute;z-index:950;left:12px;bottom:calc(150px + var(--sb));display:flex;flex-direction:column;gap:8px;align-items:center}
#markBtn{min-width:66px;height:66px;border-radius:20px;background:var(--yellow);border:none;color:#122;
  font-size:12px;font-weight:800;display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 3px 12px rgba(0,0,0,.5);padding:0 8px;cursor:pointer}
#markBtn .ic{font-size:24px;line-height:1}
#markBtn.flash{background:#fff}
#holedBtn{background:var(--hud);border:1.5px solid var(--hudline);color:#fff;font-size:11px;font-weight:700;
  border-radius:14px;padding:7px 10px;cursor:pointer}
.ballFrom{width:15px;height:15px;border-radius:50%;background:var(--yellow);border:3px solid #fff;box-shadow:0 0 6px rgba(0,0,0,.6)}
.ballDot{width:11px;height:11px;border-radius:50%;background:#fff;border:2px solid #111}
</style>
</head>
<body>
<div id="app">
  <main id="main"></main>
  <nav>
    <button id="nav-golf" onclick="go('golf')"><span class="ic">⛳</span>golf</button>
    <button id="nav-mlm" onclick="go('mlm')"><span class="ic">📡</span>mlm2pro</button>
    <button id="nav-stats" onclick="go('stats')"><span class="ic">📈</span>stats</button>
    <button id="nav-bag" onclick="go('bag')"><span class="ic">🎒</span>bag</button>
  </nav>
</div>

<div id="setup" class="hidden"></div>

<div id="holeScreen" class="hidden">
  <div id="map"></div>
  <div id="fcb" style="display:none">
    <div class="bf"><span id="fcbB">—</span><span class="u">b</span></div>
    <div class="c" id="fcbC">—</div>
    <div class="bf"><span id="fcbF">—</span><span class="u">f</span></div>
  </div>
  <div id="hcap"></div>
  <button class="hudBtn" id="closeHole" onclick="exitHole()">✕</button>
  <div id="sideCol">
    <button class="hudBtn" id="gpsBtn" onclick="startGps()" title="GPS">🧍</button>
    <button class="hudBtn" onclick="refitHole()" title="Recenter">↻</button>
    <button class="hudBtn" onclick="openLogSheet()" title="Log shot">✏️</button>
    <button class="hudBtn" onclick="openScorecard()" title="Scorecard">🗒</button>
  </div>
  <div id="markStack">
    <button id="markBtn" onclick="markBall()"><span class="ic">📍</span>Mark ball</button>
    <button id="holedBtn" onclick="holedIt()">🕳 Holed</button>
  </div>
  <div id="clubPill" style="display:none"><div><div class="club" id="pillClub">—</div><div class="opt" id="pillOpt">optimal</div></div><div class="altclub" id="pillAlt"></div></div>
  <div id="chipRow">
    <div class="mchip arrowChip" onclick="navHole(-1)">‹</div>
    <div class="mchip" onclick="fetchElev(true)"><span id="elevChip">—</span><small>ft elev</small></div>
    <div class="mchip" onclick="cyclePar()"><span class="yellow" id="holeNum">1</span><small id="holePar">PAR 4</small></div>
    <div class="mchip" onclick="cycleWind()"><span><span id="windArrow" style="display:inline-block">↑</span> <span id="windChip">—</span></span><small>mph</small></div>
    <div class="mchip arrowChip" onclick="navHole(1)">›</div>
  </div>
  <div id="toast"></div>
</div>

<div id="backdrop" class="hidden" onclick="closeSheet()"></div>
<div class="sheet hidden" id="sheet"><div class="grab"></div><div id="sheet-body"></div></div>

<script>
/* ================= STATE ================= */
const DEFAULT_BAG=[["Driver",230],["3 Wood",210],["5 Wood",195],["4i",180],["5i",170],["6i",160],["7i",150],["8i",140],["9i",130],["PW",118],["GW",105],["SW",90],["LW",75]];
let S=load();
function load(){try{const d=JSON.parse(localStorage.getItem("tangent_v1"));if(d&&d.bag){d.lm=d.lm||{};d.favs=d.favs||[];d.hcap=d.hcap===undefined?8:d.hcap;return d;}}catch(e){}
  return {bag:DEFAULT_BAG.map(c=>({name:c[0],carry:c[1]})),rounds:[],active:null,lm:{},favs:[],hcap:8};}
function save(){localStorage.setItem("tangent_v1",JSON.stringify(S));}
function today(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function esc(s){return String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
const CVER=8; // bump whenever the course parser changes — invalidates stale phone caches
let COURSE=null; try{COURSE=JSON.parse(localStorage.getItem("tangent_course"));if(!COURSE||COURSE.v!==CVER)COURSE=null;}catch(e){COURSE=null;}
function saveCourse(){localStorage.setItem("tangent_course",JSON.stringify(COURSE));}

/* ============ STROKES GAINED (Broadie scratch baseline) ============ */
const TEE=[[100,2.92],[120,2.99],[140,2.97],[160,2.99],[180,3.05],[200,3.12],[220,3.17],[240,3.25],[260,3.45],[280,3.65],[300,3.71],[320,3.79],[340,3.86],[360,3.92],[380,3.96],[400,3.99],[420,4.02],[440,4.08],[460,4.17],[480,4.28],[500,4.41],[520,4.54],[540,4.65],[560,4.74],[580,4.79],[600,4.82]];
const FWY=[[10,2.18],[20,2.40],[40,2.60],[60,2.70],[80,2.75],[100,2.80],[120,2.85],[140,2.91],[160,2.98],[180,3.08],[200,3.19],[220,3.32],[240,3.45],[260,3.58],[280,3.69],[300,3.78],[320,3.84],[340,3.88],[360,3.95],[380,4.03],[400,4.11],[440,4.20],[480,4.40],[520,4.66],[560,4.86],[600,4.94]];
const RGH=[[10,2.34],[20,2.59],[40,2.78],[60,2.91],[80,2.96],[100,3.02],[120,3.08],[140,3.15],[160,3.23],[180,3.31],[200,3.42],[220,3.53],[240,3.64],[260,3.74],[280,3.83],[300,3.90],[320,3.95],[340,4.02],[360,4.11],[380,4.21],[400,4.30],[440,4.39],[480,4.59],[520,4.85],[560,5.05],[600,5.13]];
const SND=[[10,2.43],[20,2.53],[40,2.82],[60,3.15],[80,3.24],[100,3.23],[120,3.21],[140,3.22],[160,3.28],[180,3.40],[200,3.55],[220,3.70],[240,3.84],[260,3.93],[280,4.00],[300,4.04],[320,4.12],[340,4.26],[360,4.41],[380,4.55],[400,4.69],[440,4.78],[480,4.98],[520,5.24],[560,5.44],[600,5.52]];
const RCV=[[100,3.80],[140,3.80],[180,3.82],[220,3.92],[260,4.03],[300,4.20],[340,4.44],[380,4.66],[420,4.79],[460,4.93],[500,5.17],[540,5.42],[600,5.58]];
const GRN=[[1,1.001],[2,1.009],[3,1.053],[4,1.147],[5,1.256],[6,1.357],[7,1.443],[8,1.515],[9,1.575],[10,1.626],[15,1.784],[20,1.886],[30,2.019],[40,2.113],[50,2.195],[60,2.276],[90,2.560]];
function interp(tbl,x){
  if(x<=tbl[0][0])return tbl[0][1];
  if(x>=tbl[tbl.length-1][0])return tbl[tbl.length-1][1];
  for(let i=1;i<tbl.length;i++){if(x<=tbl[i][0]){const[a,va]=tbl[i-1],[b,vb]=tbl[i];return va+(vb-va)*(x-a)/(b-a);}}
  return tbl[tbl.length-1][1];
}
function expS(lie,dist,par){
  if(lie==="green")return interp(GRN,dist);
  if(lie==="tee")return par>=4?interp(TEE,dist):interp(FWY,dist);
  if(lie==="fairway")return interp(FWY,dist);
  if(lie==="rough")return interp(RGH,dist);
  if(lie==="sand")return interp(SND,dist);
  return interp(RCV,dist);
}
function catOf(s,par){
  if(s.lie==="green")return"putt";
  if(s.lie==="tee"&&par>=4)return"drive";
  if(s.lie!=="tee"&&s.dist<=30)return"short";
  return"app";
}
const CATNAMES={drive:"Off the Tee",app:"Approach",short:"Short Game",putt:"Putting"};
function holeCalcS(h){
  const sg={drive:0,app:0,short:0,putt:0};let strokes=0;
  h.shots.forEach((s,i)=>{
    const exp=expS(s.lie,s.dist,h.par);
    const nxt=i+1<h.shots.length?expS(h.shots[i+1].lie,h.shots[i+1].dist,h.par):0;
    sg[catOf(s,h.par)]+=exp-nxt-1-(s.pen?1:0);
    strokes+=1+(s.pen?1:0);
  });
  return{sg,strokes};
}
function roundCalc(r){
  const sg={drive:0,app:0,short:0,putt:0};let score=0,toPar=0,putts=0,gir=0,girN=0,fir=0,firN=0,scr=0,scrN=0;
  r.holes.forEach(h=>{
    if(!h.shots.length)return;
    const c=holeCalcS(h);
    Object.keys(sg).forEach(k=>sg[k]+=c.sg[k]);
    score+=c.strokes;toPar+=c.strokes-h.par;
    putts+=h.shots.filter(s=>s.lie==="green").length;
    const gi=h.shots.findIndex(s=>s.lie==="green");
    girN++;
    let pens=0;h.shots.slice(0,gi<0?h.shots.length:gi).forEach(s=>{if(s.pen)pens++});
    const isGir=(gi<0?99:gi+pens)<=h.par-2;if(isGir)gir++;
    if(h.par>=4){firN++;if(h.shots[1]&&h.shots[1].lie==="fairway")fir++;}
    if(!isGir){scrN++;if(c.strokes<=h.par)scr++;}
  });
  return{sg,score,toPar,putts,gir,girN,fir,firN,scr,scrN};
}
function stablePts(strokes,par,alloc){const d=strokes-(par+alloc);return d<=-2?4:d===-1?3:d===0?2:d===1?1:0;}

/* ================= GEOMETRY ================= */
function distYds(a,b){
  const r=d=>d*Math.PI/180;
  const dLat=r(b.lat-a.lat),dLng=r(b.lng-a.lng);
  const s=Math.sin(dLat/2)**2+Math.cos(r(a.lat))*Math.cos(r(b.lat))*Math.sin(dLng/2)**2;
  return 2*6371000*Math.asin(Math.sqrt(s))*1.09361;
}
function bearing(a,b){
  const r=d=>d*Math.PI/180;
  const y=Math.sin(r(b.lng-a.lng))*Math.cos(r(b.lat));
  const x=Math.cos(r(a.lat))*Math.sin(r(b.lat))-Math.sin(r(a.lat))*Math.cos(r(b.lat))*Math.cos(r(b.lng-a.lng));
  return(Math.atan2(y,x)*180/Math.PI+360)%360;
}
function lerpPoint(a,b,f){return{lat:a.lat+(b.lat-a.lat)*f,lng:a.lng+(b.lng-a.lng)*f};}
function offsetPt(p,brg,yds){
  const R=6371000,d=yds/1.09361,r=Math.PI/180;
  const lat1=p.lat*r,lng1=p.lng*r,b=brg*r;
  const lat2=Math.asin(Math.sin(lat1)*Math.cos(d/R)+Math.cos(lat1)*Math.sin(d/R)*Math.cos(b));
  const lng2=lng1+Math.atan2(Math.sin(b)*Math.sin(d/R)*Math.cos(lat1),Math.cos(d/R)-Math.sin(lat1)*Math.sin(lat2));
  return{lat:lat2/r,lng:lng2/r};
}
function buildBuffer(pts,w){
  if(pts.length<2)return[];
  const left=[],right=[];
  for(let i=0;i<pts.length;i++){
    const a=pts[Math.max(0,i-1)],b=pts[Math.min(pts.length-1,i+1)];
    const brg=bearing(a,b);
    left.push(offsetPt(pts[i],brg-90,w));
    right.push(offsetPt(pts[i],brg+90,w));
  }
  return left.concat(right.reverse());
}
function slicePolyline(pts,startYd,endYd){
  const out=[];let acc=0;
  for(let i=0;i<pts.length-1;i++){
    const segLen=distYds(pts[i],pts[i+1]);if(segLen<0.5){continue;}
    const a0=acc,a1=acc+segLen;acc=a1;
    if(a1<startYd)continue;
    if(a0>endYd)break;
    if(!out.length)out.push(lerpPoint(pts[i],pts[i+1],Math.max(0,(startYd-a0))/segLen));
    out.push(a1<=endYd?pts[i+1]:lerpPoint(pts[i],pts[i+1],(endYd-a0)/segLen));
  }
  return out;
}
function polylineLen(pts){let t=0;for(let i=0;i<pts.length-1;i++)t+=distYds(pts[i],pts[i+1]);return t;}
function pointInPoly(pt,poly){
  let inside=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const yi=poly[i].lat,xi=poly[i].lng,yj=poly[j].lat,xj=poly[j].lng;
    if(((yi>pt.lat)!==(yj>pt.lat))&&(pt.lng<(xj-xi)*(pt.lat-yi)/(yj-yi)+xi))inside=!inside;
  }
  return inside;
}
function polyArea(pts){
  let a=0;for(let i=0,j=pts.length-1;i<pts.length;j=i++)a+=(pts[j].lng+pts[i].lng)*(pts[j].lat-pts[i].lat);
  return Math.abs(a/2);
}
function stitchRings(segs){
  // join way segments that share endpoints into closed rings (for OSM multipolygons)
  segs=segs.filter(s=>s&&s.length>1).map(s=>s.slice());
  const eq=(a,b)=>Math.abs(a.lat-b.lat)<1e-7&&Math.abs(a.lng-b.lng)<1e-7;
  const rings=[];
  while(segs.length){
    let ring=segs.shift(),changed=true;
    while(changed&&!eq(ring[0],ring[ring.length-1])){
      changed=false;
      for(let i=0;i<segs.length;i++){
        const s=segs[i];
        if(eq(ring[ring.length-1],s[0])){ring=ring.concat(s.slice(1));segs.splice(i,1);changed=true;break;}
        if(eq(ring[ring.length-1],s[s.length-1])){ring=ring.concat(s.slice(0,-1).reverse());segs.splice(i,1);changed=true;break;}
        if(eq(ring[0],s[s.length-1])){ring=s.slice(0,-1).concat(ring);segs.splice(i,1);changed=true;break;}
        if(eq(ring[0],s[0])){ring=s.slice(1).reverse().concat(ring);segs.splice(i,1);changed=true;break;}
      }
    }
    if(ring.length>=3)rings.push(ring);
  }
  return rings;
}
function centroid(pts){
  let lat=0,lng=0,n=0;
  for(let i=0;i<pts.length;i++){
    if(i===pts.length-1&&pts[i].lat===pts[0].lat&&pts[i].lng===pts[0].lng)break;
    lat+=pts[i].lat;lng+=pts[i].lng;n++;
  }
  return{lat:lat/n,lng:lng/n};
}

// Overpass with mirror fallback — the main server rate-limits, mirrors pick up the slack
const OVP_EPS=["https://overpass-api.de/api/interpreter","https://maps.mail.ru/osm/tools/overpass/api/interpreter","https://overpass.kumi.systems/api/interpreter"];
async function ovpFetch(q){
  let lastErr=null;
  for(const ep of OVP_EPS){
    try{
      const res=await fetch(ep,{method:"POST",body:"data="+encodeURIComponent(q)});
      if(!res.ok)throw new Error("HTTP "+res.status);
      const d=await res.json();
      if(d&&d.elements)return d;
      throw new Error("bad payload");
    }catch(e){lastErr=e;}
  }
  throw lastErr||new Error("all Overpass mirrors failed");
}
async function fetchNearby(pos){
  const q=`[out:json][timeout:25];(way["leisure"="golf_course"](around:25000,${pos.lat},${pos.lng});relation["leisure"="golf_course"](around:25000,${pos.lat},${pos.lng}););out center tags;`;
  try{
    const data=await ovpFetch(q);
    const seen={};NEARBY=[];
    for(const el of data.elements){
      const t=el.tags||{};if(!t.name||seen[t.name])continue;seen[t.name]=1;
      const c=el.center||{lat:el.lat,lon:el.lon};if(!c||!c.lat)continue;
      NEARBY.push({name:t.name,city:t["addr:city"]||"",lat:c.lat,lng:c.lon,
        mi:distYds(pos,{lat:c.lat,lng:c.lon})*0.000568182,holes:t.holes?parseInt(t.holes):18});
    }
    NEARBY.sort((a,b)=>a.mi-b.mi);
    render();
    if(!NEARBY.length)alert("No mapped courses within 15 miles — try search instead.");
  }catch(e){alert("Course lookup failed ("+e.message+") — try again.");}
}

    let data=await res.json();

/* ================= COURSE DATA (Overpass) ================= */
async function loadCourse(c){
  if(COURSE&&COURSE.v===CVER&&COURSE.name===c.name&&COURSE.greens){if(document.getElementById("loadNote"))document.getElementById("loadNote").textContent="";renderSetup();return;}
  const q=`[out:json][timeout:25];
(way["golf"="green"](around:3200,${c.lat},${c.lng});
 way["golf"="bunker"](around:3200,${c.lat},${c.lng});
 way["golf"="fairway"](around:3200,${c.lat},${c.lng});
 way["golf"="tee"](around:3200,${c.lat},${c.lng});
 way["golf"="hole"](around:3200,${c.lat},${c.lng});
 way["golf"="water_hazard"](around:3200,${c.lat},${c.lng});
 way["natural"="water"](around:3200,${c.lat},${c.lng});
 way["leisure"="golf_course"](around:3200,${c.lat},${c.lng});
 relation["golf"~"fairway|green|bunker|tee|water_hazard"](around:3200,${c.lat},${c.lng});
 relation["leisure"="golf_course"](around:3200,${c.lat},${c.lng}););
out geom;`;
  try{
    // two full passes over the mirror chain — the map servers rate-limit under load
    let data=null,ferr=null;
    for(let att=0;att<2&&!data;att++){
      try{data=await ovpFetch(q);}catch(e){ferr=e;await new Promise(r=>setTimeout(r,2500));}
    }
    if(!data)throw ferr||new Error("no data");
    // collect everything first, then clip to the ONE course boundary we selected
    const raw={greens:[],bunkers:[],fairways:[],tees:[],water:[],holes:[],boundaries:[]};
    const sortRaw=(tags,pts,fromRel)=>{
      if(pts.length<3)return;
      if(tags.golf==="green")raw.greens.push({pts,ref:tags.ref||null});
      else if(tags.golf==="bunker")raw.bunkers.push({pts});
      else if(tags.golf==="fairway")raw.fairways.push({pts});
      else if(tags.golf==="tee")raw.tees.push({pts,ref:tags.ref||null});
      else if(tags.golf==="water_hazard"||tags.natural==="water")raw.water.push({pts});
      else if(tags.leisure==="golf_course")raw.boundaries.push({pts});
    };
    for(const el of data.elements){
      const tags=el.tags||{};
      if(el.type==="relation"&&el.members){
        // multipolygon (e.g. Maplewood's fairways) — stitch outer member ways into rings
        const outers=el.members.filter(m=>m.type==="way"&&m.geometry&&m.role!=="inner")
          .map(m=>m.geometry.map(g=>({lat:g.lat,lng:g.lon})));
        for(const ring of stitchRings(outers))sortRaw(tags,ring,true);
        continue;
      }
      if(el.type!=="way"||!el.geometry||el.geometry.length<2)continue;
      const pts=el.geometry.map(g=>({lat:g.lat,lng:g.lon}));
      if(tags.golf==="hole"){raw.holes.push({pts,ref:tags.ref||null,par:tags.par||null,hcap:tags.handicap||null});continue;}
      sortRaw(tags,pts,false);
    }
    // keep every boundary ring belonging to the selected course (a course split by a
    // river/road has several rings) — rings of the neighbouring course are far away
    const ctr={lat:c.lat,lng:c.lng};
    const rings=raw.boundaries.filter(b=>pointInPoly(ctr,b.pts)||distYds(centroid(b.pts),ctr)<1500);
    let keep;
    if(rings.length){
      // inside any of our rings, or close to the course center (safety net for gaps in stitched rings)
      keep=pts=>{const k=centroid(pts);return rings.some(r=>pointInPoly(k,r.pts))||distYds(k,ctr)<1000;};
    }else{
      // no boundary mapped: grow a cluster outward from the course center so a long
      // course keeps all its features, but the neighbouring course (a big gap away) doesn't join
      const all=[];
      for(const k of["greens","bunkers","fairways","tees","water","holes"])
        for(const f of raw[k])all.push({c:centroid(f.pts),keep:false});
      for(const f of all)if(distYds(f.c,ctr)<1000)f.keep=true;
      let grew=true;
      while(grew){
        grew=false;
        for(const f of all)if(!f.keep)
          for(const g of all)if(g.keep&&distYds(f.c,g.c)<450){f.keep=true;grew=true;break;}
      }
      const kept=all.filter(f=>f.keep).map(f=>f.c);
      keep=pts=>{const k=centroid(pts);return kept.some(c=>distYds(k,c)<30)||distYds(k,ctr)<1000;};
    }
    const filt=arr=>arr.filter(f=>keep(f.pts));
    COURSE={v:CVER,name:c.name,center:ctr,
      greens:filt(raw.greens),bunkers:filt(raw.bunkers),fairways:filt(raw.fairways),
      tees:filt(raw.tees),water:filt(raw.water),holes:filt(raw.holes),
      boundary:rings,holesSorted:[]};
    COURSE.holesSorted=COURSE.holes.filter(h=>h.ref!==null&&!isNaN(parseInt(h.ref))).sort((a,b)=>parseInt(a.ref)-parseInt(b.ref));
    synthHoles(COURSE);   // rebuild holes from greens+tees when OSM has no hole centerlines
    saveCourse();
    COURSEDRAWN=false;
    renderSetup();
  }catch(e){
    const el=document.getElementById("loadNote");
    if(el)el.textContent="Course map unavailable — GPS distances still work.";
  }
}
function synthHoles(course){
  if(course.holesSorted.length||!course.greens.length)return;
  const tees=course.tees.map(t=>({c:centroid(t.pts),ref:t.ref&&!isNaN(parseInt(t.ref))?parseInt(t.ref):null}));
  // assign each fairway polygon to the green it ends nearest to (keep the biggest per green)
  const fwyByGreen={};
  course.fairways.forEach(f=>{
    let gi=-1,gd=110;
    course.greens.forEach((g,idx)=>{
      const gc=centroid(g.pts);
      let dmin=1e9;for(const p of f.pts){const d=distYds(p,gc);if(d<dmin)dmin=d;}
      if(dmin<gd){gd=dmin;gi=idx;}
    });
    if(gi>=0&&(!fwyByGreen[gi]||polyArea(f.pts)>polyArea(fwyByGreen[gi].pts)))fwyByGreen[gi]=f;
  });
  const built=course.greens.map((g,i)=>{
    const gc=centroid(g.pts);
    const gref=g.ref&&!isNaN(parseInt(g.ref))?parseInt(g.ref):null;
    const fw=fwyByGreen[i];
    let line;
    if(fw){
      // route the hole THROUGH its fairway: tee end = fairway vertex farthest from the green
      let far=null,fdd=-1;for(const p of fw.pts){const d=distYds(p,gc);if(d>fdd){fdd=d;far=p;}}
      const fc=centroid(fw.pts);
      // back tee = near the fairway's tee end, BEHIND it, aimed down the same corridor,
      // and a typical distance (~40 yd) behind the fairway start — not a neighbour's tee
      const brgFar=bearing(far,gc);
      let tee=null,best=-1;
      for(const t of tees){
        if(distYds(t.c,far)>200)continue;
        const dG=distYds(t.c,gc);
        if(dG<=fdd-15||dG-fdd>120)continue;   // behind the fairway start, but not absurdly far back
        let ang=Math.abs(bearing(t.c,gc)-brgFar);ang=Math.min(ang,360-ang);
        if(ang>35)continue;
        if(dG>best){best=dG;tee=t.c;}          // back tee = farthest plausible
      }
      if(!tee)tee=offsetPt(far,bearing(gc,far),20);
      line=[tee,fc,gc];
      if(polylineLen(line)<110){
        // fairway match was bogus (an apron, probably) — treat as a par 3 instead
        let t3=null,bd3=1e9;
        for(const t of tees){const d=distYds(t.c,gc);if(d>90&&d<650&&d<bd3){bd3=d;t3=t.c;}}
        if(t3)line=[t3,gc];
      }
    }else{
      // no fairway (par 3): tee straight to green
      let tee=null,bd=1e9;
      if(gref!=null){let farD=-1;for(const t of tees){if(t.ref===gref){const d=distYds(t.c,gc);if(d>60&&d<700&&d>farD){farD=d;tee=t.c;}}}}
      if(!tee)for(const t of tees){const d=distYds(t.c,gc);if(d>90&&d<650&&d<bd){bd=d;tee=t.c;}}
      if(!tee)tee=offsetPt(gc,bearing(gc,course.center),175);
      line=[tee,gc];
    }
    const len=polylineLen(line);
    const par=len<240?"3":len<490?"4":"5";
    return{pts:line,ref:g.ref||String(i+1),par,hcap:null,synth:true,realRef:gref!=null};
  });
  const realCount=built.filter(h=>h.realRef).length;
  if(realCount>=Math.min(9,course.greens.length/2)){
    // most greens are numbered: trust the numbers, slot unnumbered greens into the
    // missing hole numbers (best neighbour fit), drop leftovers (practice greens)
    const real=built.filter(h=>h.realRef),un=built.filter(h=>!h.realRef);
    const byRef={};
    real.forEach(h=>{const k=parseInt(h.ref);if(!byRef[k]||polylineLen(h.pts)>polylineLen(byRef[k].pts))byRef[k]=h;});
    const maxRef=Math.max(...Object.keys(byRef).map(Number));
    const target=maxRef>=15?18:maxRef;
    const greenOf=h=>h.pts[h.pts.length-1];
    const assigned=new Set();
    for(let m=1;m<=target;m++){
      if(byRef[m])continue;
      let best=null,bs=1e12;
      un.forEach((h,ui)=>{
        if(assigned.has(ui))return;
        let s=0,n=0;
        [m-1,m+1].forEach(nb=>{if(byRef[nb]){s+=distYds(greenOf(h),greenOf(byRef[nb]));n++;}});
        if(n){s/=n;if(s<bs){bs=s;best=ui;}}
      });
      if(best!=null&&bs<900){assigned.add(best);un[best].ref=String(m);byRef[m]=un[best];}
    }
    course.holesSorted=Object.values(byRef).sort((a,b)=>parseInt(a.ref)-parseInt(b.ref));
  }else{
    const numbered=built.filter(h=>!isNaN(parseInt(h.ref)));
    course.holesSorted=(numbered.length?numbered:built).sort((a,b)=>parseInt(a.ref)-parseInt(b.ref));
  }
  course.holes=course.holesSorted;
}
function nearestGreenTo(pt){
  let best={green:null,d:Infinity};
  for(const g of (COURSE&&COURSE.greens)||[]){
    const d=distYds(pt,centroid(g.pts));
    if(d<best.d)best={green:g,d};
  }
  return best;
}

/* ================= ROUND ================= */
let EXPLORE=false;
async function startRound(explore){
  EXPLORE=explore;
  const c=SETUP.course;
  // make sure the SELECTED course's map is loaded before we build the round —
  // never fall back to a stale/previous course
  if(!COURSE||COURSE.name!==c.name||!COURSE.greens){
    const note=document.getElementById("loadNote");if(note)note.textContent="Loading course map…";
    await loadCourse(c);
  }
  if(!COURSE||COURSE.name!==c.name){
    alert("Couldn't download the "+c.name+" course map — the free map server is busy.\n\nWait a few seconds and tap Play again.");
    const note=document.getElementById("loadNote");if(note)note.textContent="Map load failed — tap Play to retry.";
    return;
  }
  const hs=(COURSE&&COURSE.name===c.name&&COURSE.holesSorted.length)?COURSE.holesSorted:null;
  const n=hs?hs.length:(c.holes||18);
  if(!explore){
    S.active={course:c.name,city:c.city||"",date:today(),scoring:SETUP.scoring,net:SETUP.net,
      holes:Array.from({length:n},(_,i)=>({par:hs?(parseInt(hs[i].par)||4):4,hcap:hs?(parseInt(hs[i].hcap)||null):null,shots:[],done:false})),
      cur:Math.min(SETUP.start-1,n-1)};
    save();
  }
  closeSetup();
  enterHole();
}
function resumeRound(){
  EXPLORE=false;
  if(COURSE&&COURSE.name===S.active.course)enterHole();
  else{
    // need geometry again — best effort from favorites/nearby, else map-less
    const src=S.favs.find(f=>f.name===S.active.course)||NEARBY.find(f=>f.name===S.active.course);
    if(src){SETUP.course=src;loadCourse(src).then(()=>enterHole());}
    else enterHole();
  }
}
function curHole(){return S.active?S.active.holes[S.active.cur]:null;}

/* ================= HOLE SCREEN / MAP ================= */
let map=null,youMarker=null,teeMarker=null,flagMarker=null,fromMarker=null,courseLayer=null,holeLayer=null,shotLayer=null,aimLayer=null,greenPolys=[];

function initHoleMap(){

function drawCourseLayers(){
  if(!COURSE||COURSEDRAWN||!courseLayer)return;
  courseLayer.clearLayers();greenPolys=[];
  const draw=(arr,st)=>{for(const f of arr||[])L.polygon(f.pts.map(p=>[p.lat,p.lng]),st).addTo(courseLayer);};
  draw(COURSE.boundary,HSTYLE.rough);
  draw(COURSE.fairways,HSTYLE.fairway);
  draw(COURSE.water,HSTYLE.water);
  draw(COURSE.bunkers,HSTYLE.bunker);
  draw(COURSE.tees,HSTYLE.tee);
  for(const g of COURSE.greens){
    const poly=L.polygon(g.pts.map(p=>[p.lat,p.lng]),HSTYLE.green).addTo(courseLayer);

function holeGeom(i){
  if(!COURSE||!COURSE.holesSorted.length)return null;

}
// per-hole fairway cache: which fairway polygons belong to the current hole,
// plus a grid of points inside them (used to keep the layup target on the short grass)
let HOLEFWY={polys:[],samples:[],line:[]};
function buildHoleFwy(center){
  HOLEFWY={polys:[],samples:[],line:[]};
  if(!center||center.length<2)return;
  const total=polylineLen(center);
  const line=[center[0]];
  for(let d=20;d<total-10;d+=25)line.push(...slicePolyline(center,d,d+1));
  line.push(center[center.length-1]);
  HOLEFWY.line=line;   // the hole's route — flight paths should stay near it (doglegs!)
  if(!COURSE||!COURSE.fairways||!COURSE.fairways.length)return;
  HOLEFWY.polys=COURSE.fairways.filter(f=>line.some(s=>pointInPoly(s,f.pts)));
  for(const f of HOLEFWY.polys){
    let mnLa=90,mxLa=-90,mnLo=180,mxLo=-180;
    for(const p of f.pts){mnLa=Math.min(mnLa,p.lat);mxLa=Math.max(mxLa,p.lat);mnLo=Math.min(mnLo,p.lng);mxLo=Math.max(mxLo,p.lng);}
    const stepLa=(mxLa-mnLa)/13,stepLo=(mxLo-mnLo)/13;
    if(stepLa<=0||stepLo<=0)continue;
    for(let a=mnLa+stepLa/2;a<mxLa;a+=stepLa)
      for(let o=mnLo+stepLo/2;o<mxLo;o+=stepLo){
        const pt={lat:a,lng:o};
        if(pointInPoly(pt,f.pts))HOLEFWY.samples.push(pt);
      }
  }
}
function realFairwayNear(center){
  // only true if a hand-mapped fairway actually sits ON this hole's line —
  // a neighbouring hole's fairway must not suppress our ribbon
  return HOLEFWY.polys.length>0;
}
function drawHoleCorridor(center){
  if(!holeLayer)return;
  holeLayer.clearLayers();
  if(!center||center.length<2)return;
  const total=polylineLen(center);
  if(total<40)return;
  // synthetic fairway ribbon only where OSM has no real fairway shapes (and not on par-3s)
  if(total>=200&&!realFairwayNear(center)){
    const fwyStart=Math.min(40,total*0.18),fwyEnd=Math.max(fwyStart+20,total-28);
    const fwyLine=slicePolyline(center,fwyStart,fwyEnd);
    const fwy=buildBuffer(fwyLine,16);
    if(fwy.length)L.polygon(fwy.map(p=>[p.lat,p.lng]),HSTYLE.holeFwy).addTo(holeLayer).bringToBack();
  }
  // shaded hole corridor (rough) — full length, wide, UNDER the fairway shapes
  const corr=buildBuffer(center,32);
  if(corr.length)L.polygon(corr.map(p=>[p.lat,p.lng]),HSTYLE.corridor).addTo(holeLayer).bringToBack();
}
function showHole(i){
  if(!EXPLORE){S.active.cur=i;save();}
  EXPLOREIDX=i;
  AIM=null;
  const hg=holeGeom(i);
  if(hg&&map){
    const a=hg.pts[0],b=hg.pts[hg.pts.length-1];
    const ga=nearestGreenTo(a),gb=nearestGreenTo(b);
    let teeEnd=a,g=gb;
    if(ga.d<gb.d){teeEnd=b;g=ga;}
    TEEPOS={lat:teeEnd.lat,lng:teeEnd.lng};
    const center=(teeEnd===a)?hg.pts:hg.pts.slice().reverse();
    HOLECTR=center;
    buildHoleFwy(center);
    drawHoleCorridor(center);
    setFlagOnGreen(g.green&&g.d<120?g.green:null,teeEnd===a?b:a);
    map.fitBounds(L.latLngBounds(hg.pts.map(p=>[p.lat,p.lng])).pad(0.35));
    if(!teeMarker)teeMarker=L.marker([teeEnd.lat,teeEnd.lng],{interactive:false,icon:L.divIcon({className:"",html:"<div class='teeDot'></div>",iconAnchor:[8,8]})}).addTo(map);
    else teeMarker.setLatLng([teeEnd.lat,teeEnd.lng]);
  }else{
    FLAG=null;GREEN=null;HOLEFWY={polys:[],samples:[],line:[]};HOLECTR=null;
    if(holeLayer)holeLayer.clearLayers();
    if(flagMarker){flagMarker.remove();flagMarker=null;}
    if(map&&COURSE)map.setView([COURSE.center.lat,COURSE.center.lng],16);
    else if(map&&POS)map.setView([POS.lat,POS.lng],16);
  }
  updateHoleHud();
  drawHoleShots();
  fetchElev(false);
  recalcHole();
}
let EXPLOREIDX=0;

  FLAG={lat:pt.lat,lng:pt.lng};

    if(!flagMarker)flagMarker=L.marker([pt.lat,pt.lng],{interactive:false,icon:L.divIcon({className:"",html:"<div class='flagBadge'>⛳</div>",iconSize:[0,0]})}).addTo(map);
    else flagMarker.setLatLng([pt.lat,pt.lng]);

function refitHole(){const hg=holeGeom(EXPLORE?EXPLOREIDX:S.active.cur);
  if(hg&&map)map.fitBounds(L.latLngBounds(hg.pts.map(p=>[p.lat,p.lng])).pad(0.35));

function navHole(d){

function cyclePar(){

}
function updateHoleHud(){

function startGps(){

        else youMarker.setLatLng([POS.lat,POS.lng]);

  {enableHighAccuracy:true,maximumAge:2000,timeout:20000});
}
function onCourseNow(){
  // "on the hole" only if the live fix is near this hole's tee or green —
  // otherwise (e.g. testing from home) we use the tee so it never jumps to the nearest hole
  if(!POS)return false;
  const refs=[TEEPOS,FLAG].filter(Boolean);
  return refs.some(r=>distYds(POS,r)<900);
}
function effPos(){return onCourseNow()?POS:TEEPOS;}
function clubAverages(){
  const acc={};
  const scan=r=>r.holes.forEach(h=>h.shots.forEach((s,i)=>{
    if(!s.club||s.lie==="green")return;
    let len=s.length;   // GPS-measured shot distance, when present
    if(len==null){const nxt=h.shots[i+1];const end=nxt?(nxt.lie==="green"?nxt.dist/3:nxt.dist):0;len=s.dist-end;}
    if(len>20){(acc[s.club]=acc[s.club]||[]).push(len);}
  }));
  S.rounds.forEach(scan);if(S.active)scan(S.active);
  Object.keys(S.lm||{}).forEach(k=>{(acc[k]=acc[k]||[]).push(...S.lm[k]);});
  const out={};Object.keys(acc).forEach(k=>{if(acc[k].length>=3)out[k]=Math.round(acc[k].reduce((a,b)=>a+b)/acc[k].length);});
  return out;
}
function bagSorted(){
  const learned=clubAverages();
  return S.bag.map(b=>({name:b.name,carry:learned[b.name]||b.carry})).sort((a,b)=>b.carry-a.carry);
}
function windComponent(from,to){
  if(WINDMODE==="off")return 0;
  if(WINDMODE==="man")return WINDMAN;
  if(!WEATHER)return 0;
  const brg=bearing(from,to);
  return WEATHER.windMph*Math.cos((brg-WEATHER.windDeg)*Math.PI/180); // + into, − helping
}
function cycleWind(){
  WINDMODE=WINDMODE==="auto"?"off":WINDMODE==="off"?"man":"auto";
  if(WINDMODE==="man")WINDMAN=10;
  toast(WINDMODE==="auto"?"Wind: live weather":WINDMODE==="off"?"Wind: off":"Wind: manual 10 mph into");
  recalcHole();
}
function updateWindChip(p,tgt){
  const chip=document.getElementById("windChip"),arrow=document.getElementById("windArrow");
  let mph="—",rot=180,show=true;
  if(WINDMODE==="off"){mph="off";show=false;}
  else if(WINDMODE==="man"){mph=WINDMAN;rot=180;} // into = pointing down toward player
  else if(WEATHER){
    mph=Math.round(WEATHER.windMph);
    if(p&&tgt){
      const travel=(WEATHER.windDeg+180)%360;   // direction wind blows TOWARD
      rot=(travel-bearing(p,tgt)+360)%360;       // 0 = helping (up), 180 = into (down)
    }
  }
  chip.textContent=mph;
  arrow.style.opacity=show?"1":"0";
  arrow.style.transform="rotate("+rot+"deg)";
}
function effYds(raw,from,to){
  const w=windComponent(from,to);
  let e=raw*(1+(w>0?0.01*w:0.005*w));
  if(ELEV.ft!=null)e+=ELEV.ft/3;   // ~1 yd per 3 ft, added 1:1
  return Math.round(e);
}
async function fetchElev(force){
  const p=effPos(),t=FLAG;
  if(!p||!t){ELEV={ft:null};paintElev();return;}
  const key=p.lat.toFixed(4)+","+t.lat.toFixed(4)+","+t.lng.toFixed(4);
  if(!force&&key===ELEVKEY)return;
  ELEVKEY=key;
  try{
    const res=await fetch(`https://api.open-meteo.com/v1/elevation?latitude=${p.lat},${t.lat}&longitude=${p.lng},${t.lng}`);
    const d=await res.json();
    if(d&&d.elevation&&d.elevation.length===2){
      ELEV={ft:(d.elevation[1]-d.elevation[0])*3.28084};
    }else ELEV={ft:null};
  }catch(e){ELEV={ft:null};}
  paintElev();
  recalcHole();
}
function paintElev(){
  const el=document.getElementById("elevChip");if(!el)return;
  if(ELEV.ft==null){el.textContent="—";return;}
  const v=Math.round(ELEV.ft);
  el.textContent=(Math.abs(v)<2?"0":(v>0?v+" ⌃":Math.abs(v)+" ⌄"));
}
function recommend(e){
  const clubs=bagSorted();
  const longest=clubs[0],shortest=clubs[clubs.length-1];
  if(e>longest.carry+5)return{club:longest.name,note:"max out"};
  if(e<shortest.carry-15)return{club:shortest.name,note:"partial"};
  let over=null,under=null;
  for(const c of clubs){if(c.carry>=e)over=c;else{under=c;break;}}
  if(!over)over=longest;
  if(over.carry-e<=4)return{club:over.name,note:"full swing"};
  if(under&&e-under.carry<=4)return{club:under.name,note:"smooth full"};
  return{club:over.name,note:"swing easy"};
}
function flightOk(from,to){
  // a shot is only "optimal" if its whole flight stays near the hole's route —
  // on a dogleg, cutting the corner means flying over the trees
  if(!HOLEFWY.line.length)return true;
  for(const f of[0.3,0.5,0.7,0.85]){
    const m=lerpPoint(from,to,f);
    const onFwy=HOLEFWY.polys.some(pg=>pointInPoly(m,pg.pts));
    const nearLine=HOLEFWY.line.some(s=>distYds(m,s)<55);
    if(!onFwy&&!nearLine)return false;
  }
  return true;
}
function planLayup(rawDist,p,tgt){
  const clubs=bagSorted();
  let choice=clubs[0];
  for(const c of clubs){if(rawDist-c.carry>=40){choice=c;break;}}
  const carry=Math.min(choice.carry,rawDist-10);
  let pt=lerpPoint(p,tgt,carry/rawDist);
  // steer whenever the straight-line target misses the fairway OR the flight
  // would cut a dogleg corner through the trees
  const straightBad=(HOLEFWY.polys.length&&!HOLEFWY.polys.some(f=>pointInPoly(pt,f.pts)))||!flightOk(p,pt);
  if(HOLEFWY.samples.length&&straightBad){
    let best=null,bs=1e12;
    for(const s of HOLEFWY.samples){
      const d=distYds(p,s);
      if(d>choice.carry+6||d<carry*0.45)continue;      // must be a real shot this club reaches
      if(!flightOk(p,s))continue;                       // no corner-cutting over trees
      const score=distYds(s,tgt)+Math.abs(d-carry)*0.7; // most progress, comfortable distance
      if(score<bs){bs=score;best={s,d};}
    }
    if(best){
      // re-pick the club: shortest one that comfortably covers the new distance
      let cl=choice;
      for(let i=clubs.length-1;i>=0;i--){if(clubs[i].carry>=best.d-3){cl=clubs[i];break;}}
      return{club:cl.name,carry:Math.round(best.d),leaves:Math.round(distYds(best.s,tgt)),pt:best.s};
    }
  }
  return{club:choice.name,carry,leaves:rawDist-carry,pt};
}
function chipMarker(pt,html){return L.marker([pt.lat,pt.lng],{interactive:false,icon:L.divIcon({className:"",html,iconSize:[0,0]})});}
function recalcHole(){
  if(document.getElementById("holeScreen").classList.contains("hidden"))return;
  const p=effPos();
  const tgt=AIM||FLAG;
  const fcb=document.getElementById("fcb");
  const pill=document.getElementById("clubPill");
  if(aimLayer)aimLayer.clearLayers();
  updateWindChip(p,tgt);
  if(!p||!tgt){fcb.style.display="none";pill.style.display="none";return;}
  const raw=Math.round(distYds(p,tgt));
  // FCB to green
  if(GREEN&&FLAG){
    let f=Infinity,b=0;
    for(const gp of GREEN.pts){const d=distYds(p,gp);if(d<f)f=d;if(d>b)b=d;}
    document.getElementById("fcbF").textContent=Math.round(f);
    document.getElementById("fcbC").textContent=Math.round(distYds(p,FLAG));
    document.getElementById("fcbB").textContent=Math.round(b);
    fcb.style.display="block";
  }else if(FLAG){
    document.getElementById("fcbF").textContent="—";
    document.getElementById("fcbC").textContent=Math.round(distYds(p,FLAG));
    document.getElementById("fcbB").textContent="—";
    fcb.style.display="block";
  }else fcb.style.display="none";
  // club / layup
  const e=effYds(raw,p,tgt);
  const clubs=bagSorted();
  let layup=null,rec;
  if(e>clubs[0].carry+5&&raw>clubs[0].carry){
    layup=planLayup(raw,p,tgt);
    rec={club:layup.club,note:"optimal"};
  }else rec=recommend(e);
  document.getElementById("pillClub").textContent=shortName(rec.club);
  document.getElementById("pillOpt").textContent=layup?"optimal · leaves "+Math.round(layup.leaves)+" yd":(e!==raw?rec.note+" · plays "+e:rec.note);
  document.getElementById("pillAlt").textContent="";
  pill.style.display="flex";
  // aim graphics
  if(map){
    if(layup){
      L.polyline([[p.lat,p.lng],[layup.pt.lat,layup.pt.lng]],{color:"#fff",weight:2.5,opacity:.95}).addTo(aimLayer);
      L.polyline([[layup.pt.lat,layup.pt.lng],[tgt.lat,tgt.lng]],{color:"#fff",weight:2,opacity:.7,dashArray:"6 7"}).addTo(aimLayer);
      chipMarker(lerpPoint(p,layup.pt,0.5),"<div class='distChip'>"+Math.round(layup.carry)+"</div>").addTo(aimLayer);
      chipMarker(lerpPoint(layup.pt,tgt,0.5),"<div class='distChip'>"+Math.round(layup.leaves)+"</div>").addTo(aimLayer);
      chipMarker(layup.pt,"<div class='suggestChip'><span class='ring'></span><span class='txt'><b>"+shortName(rec.club)+"</b><small>optimal</small></span></div>").addTo(aimLayer);
    }else{
      L.polyline([[p.lat,p.lng],[tgt.lat,tgt.lng]],{color:"#fff",weight:2.5,opacity:.95}).addTo(aimLayer);
      chipMarker(lerpPoint(p,tgt,0.5),"<div class='distChip'>"+raw+"</div>").addTo(aimLayer);
      if(AIM)chipMarker(AIM,"<div class='suggestChip'><span class='ring'></span><span class='txt'><b>"+shortName(rec.club)+"</b><small>"+(e!==raw?"plays "+e:rec.note)+"</small></span></div>").addTo(aimLayer);
    }
  }
}
function shortName(n){
  if(/driver/i.test(n))return"Dr";
  let m=n.match(/(\d)\s*wood/i);if(m)return m[1]+"W";
  m=n.match(/(\d)\s*hybrid/i);if(m)return m[1]+"H";
  return n.replace(/\s+/g,"");
}

function lieAt(pos){

  for(const g of COURSE.greens||[])if(pointInPoly(pos,g.pts))return"green";
  for(const b of COURSE.bunkers||[])if(pointInPoly(pos,b.pts))return"sand";
  for(const f of COURSE.fairways||[])if(pointInPoly(pos,f.pts))return"fairway";

/* ================= SCORECARD ================= */
function allocFor(h,i){
  if(!S.active.net)return 0;
  const hc=S.hcap||0,n=S.active.holes.length;
  const base=Math.floor(hc/n),rem=hc%n;
  const idx=h.hcap?parseInt(h.hcap):i+1;
  return base+(idx<=rem?1:0);
}
function openScorecard(){
  const r=S.active;
  const done=r.holes.map(h=>h.shots.length&&h.done?holeCalcS(h).strokes:null);
  let rows="";
  for(let g=0;g<r.holes.length;g+=9){
    const seg=r.holes.slice(g,g+9);
    rows+=`<div class="scoregrid mt">${seg.map((h,i)=>`<div class="h">${g+i+1}</div>`).join("")}
    ${seg.map((h,i)=>{const s=done[g+i];const cls=s==null?"":s<h.par?"birdie":s===h.par?"":s===h.par+1?"bogey":"dbl";
      return`<div class="s ${cls}" onclick="closeSheet();showHole(${g+i})">${s==null?"·":s}</div>`;}).join("")}</div>`;
  }
  const played=r.holes.filter((h,i)=>done[i]!=null);
  const score=done.reduce((a,b)=>a+(b||0),0);
  const toPar=played.reduce((a,h,j)=>a+0,0);
  let tp=0,pts=0;
  r.holes.forEach((h,i)=>{if(done[i]!=null){tp+=done[i]-h.par;pts+=stablePts(done[i],h.par,allocFor(h,i));}});
  sheet(`
  <h2 style="font-size:19px">${esc(r.course)}</h2>

  ${rows}
  <div class="grid3 mt">
    <div class="stat"><div class="v">${score||"—"}</div><div class="l">Total</div></div>
    <div class="stat"><div class="v">${played.length?(tp>0?"+":"")+(tp===0?"E":tp):"—"}</div><div class="l">To par</div></div>
    <div class="stat"><div class="v">${r.scoring==="stableford"?pts:played.length}</div><div class="l">${r.scoring==="stableford"?"Points":"Holes done"}</div></div>
  </div>
  <div class="row mt">
    <button class="btn grad grow" onclick="finishRound()">Finish round</button>
    <button class="btn" style="color:var(--red)" onclick="if(confirm('Discard this round?')){S.active=null;save();closeSheet();exitHole();}">Discard</button>
  </div>`);
}
function finishRound(){
  const r=S.active;
  const played=r.holes.filter(h=>h.shots.length&&h.done).length;
  if(!played)return alert("No completed holes yet.");
  if(!confirm(`Finish round with ${played} completed hole${played===1?"":"s"}?`))return;
  r.holes=r.holes.filter(h=>h.shots.length&&h.done);
  r.calc=roundCalc(r);
  S.rounds.push(r);S.active=null;save();

  document.getElementById("holeScreen").classList.add("hidden");
  if(WATCH!==null){navigator.geolocation.clearWatch(WATCH);WATCH=null;POS=null;}
  go("stats");
}

/* ================= MLM2PRO DATA ================= */
function normClub(raw){
  const s=String(raw||"").toLowerCase().replace(/[^a-z0-9 ]/g," ").replace(/\s+/g," ").trim();
  if(!s)return null;
  let m=s.match(/(\d)\s*(iron|i)\b/);if(m)return m[1]+"i";
  m=s.match(/(\d)\s*(hybrid|h)\b/);if(m)return m[1]+"H";
  m=s.match(/(\d)\s*(wood|w)\b/);if(m)return m[1]+" Wood";
  if(s.includes("driver"))return"Driver";
  if(s.includes("pitching"))return"PW";
  if(s.includes("gap")||s.includes("approach wedge"))return"GW";
  if(s.includes("sand"))return"SW";
  if(s.includes("lob"))return"LW";
  if(s.includes("putter"))return null;
  return String(raw).trim();
}
function lmAdd(club,carry){if(!club||!(carry>0))return false;(S.lm[club]=S.lm[club]||[]).push(Math.round(carry));return true;}
function lmFile(inp){
  const f=inp.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>lmParse(rd.result);
  rd.readAsText(f);
}
function splitCsv(line){
  const out=[];let cur="",q=false;
  for(const ch of line){
    if(ch==='"'){q=!q;continue;}
    if(ch===","&&!q){out.push(cur);cur="";}else cur+=ch;
  }
  out.push(cur);return out;
}
function lmParse(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  let hi=-1,ci=-1,di=-1;
  for(let i=0;i<lines.length;i++){
    const cells=splitCsv(lines[i]).map(c=>c.toLowerCase());
    const c=cells.findIndex(x=>x.includes("club"));
    let d=cells.findIndex(x=>x.includes("carry"));
    if(d<0)d=cells.findIndex(x=>x.includes("total")&&x.includes("dist"));
    if(c>=0&&d>=0){hi=i;ci=c;di=d;break;}
  }
  if(hi<0){alert("Couldn't find Club and Carry columns in that file. Export the session CSV from the Rapsodo app or my.rapsodo.com, or use manual entry below.");return;}
  let n=0,skipped=0;
  for(let i=hi+1;i<lines.length;i++){
    const cells=splitCsv(lines[i]);
    const club=normClub(cells[ci]);
    const carry=parseFloat(String(cells[di]||"").replace(/[^0-9.]/g,""));
    if(club&&carry>5&&carry<450){lmAdd(club,carry);n++;}else skipped++;
  }
  save();render();
  alert(n?`Imported ${n} shots ✓${skipped?` (${skipped} rows skipped)`:""}`:"Found the columns but no usable shot rows — check the file and try again.");
}
function lmPaste(){const t=document.getElementById("lmcsv").value;if(!t.trim())return alert("Paste your MLM2Pro CSV export first.");lmParse(t);}
function lmManual(){
  const club=document.getElementById("lmclub").value;
  const carry=parseFloat(document.getElementById("lmcarry").value);
  if(!(carry>0))return alert("Enter a carry distance.");
  lmAdd(club,carry);save();render();
}
function lmStats(){
  const out={};
  Object.keys(S.lm).forEach(k=>{
    const a=S.lm[k];if(!a.length)return;
    out[k]={n:a.length,avg:Math.round(a.reduce((x,y)=>x+y)/a.length),max:Math.max(...a)};
  });
  return out;
}
function lmClear(k){if(!confirm("Clear all "+k+" data?"))return;delete S.lm[k];save();render();}
function lmApply(){

/* ================= STATS ================= */
function vStats(){
  if(!S.rounds.length)return`<h1 class="title">Stats</h1><div class="card center"><div style="font-size:40px">📈</div>
    <b>No rounds yet</b><div class="dim small mt">Play a tracked round and your Strokes Gained report lands here.</div></div>`;
  const last=S.rounds[S.rounds.length-1],c=last.calc;
  const rs=S.rounds.slice(-20);
  const avg={drive:0,app:0,short:0,putt:0};
  rs.forEach(r=>Object.keys(avg).forEach(k=>avg[k]+=r.calc.sg[k]/rs.length));
  const total=+Object.values(c.sg).reduce((a,b)=>a+b,0).toFixed(1)||0;
  let html=`<h1 class="title">Stats</h1><div class="card">
    <b>Latest — ${esc(last.course)} · ${last.date}</b>
    <div class="row mt"><div class="grow center"><div class="big">${c.score}</div><div class="dim small">${c.toPar>0?"+":""}${c.toPar===0?"E":c.toPar} · ${last.holes.length} holes</div></div>
    <div class="grow center"><div class="big ${total>=0?"teal":"red"}">${total>=0?"+":""}${total.toFixed(1)}</div><div class="dim small">SG vs scratch</div></div></div>
    <div class="mt">${sgBars(c.sg)}</div>
    <div class="grid3 mt">
      <div class="stat"><div class="v">${c.putts}</div><div class="l">Putts</div></div>
      <div class="stat"><div class="v">${c.girN?Math.round(c.gir/c.girN*100):0}%</div><div class="l">GIR</div></div>
      <div class="stat"><div class="v">${c.firN?Math.round(c.fir/c.firN*100):0}%</div><div class="l">FIR</div></div>
    </div>
  </div>`;
  html+=`<div class="card"><b>Tangent Four — last ${rs.length} round${rs.length===1?"":"s"}</b>
    <div class="center mt">${spider(avg)}</div>
    <div class="dim small center">Strokes gained per round vs scratch.</div></div>`;
  if(S.rounds.length>=2)html+=`<div class="card"><b>Score trend</b><div class="mt">${trend(S.rounds.map(r=>r.calc.score))}</div></div>`;
  html+=drilldowns();
  html+=`<div class="card"><b>Rounds</b>${S.rounds.slice().reverse().map((r,ri)=>{
    const i=S.rounds.length-1-ri;
    return`<div class="shot"><span class="grow">${esc(r.course)}<br><span class="dim small">${r.date} · ${r.holes.length} holes</span></span>
      <span class="mono"><b>${r.calc.score}</b> <span class="dim">(${r.calc.toPar>0?"+":""}${r.calc.toPar===0?"E":r.calc.toPar})</span></span>
      <button class="btn sm" style="color:var(--red);background:none" onclick="if(confirm('Delete this round?')){S.rounds.splice(${i},1);save();render();}">✕</button></div>`;}).join("")}</div>`;
  return html;
}
function sgBars(sg){
  const max=3;
  return Object.keys(CATNAMES).map(k=>{
    const v=sg[k],pct=Math.min(1,Math.abs(v)/max)*50;
    return`<div class="bar"><span class="l">${CATNAMES[k]}</span>
      <div class="track"><div style="position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--line)"></div>
      <div class="fill" style="${v>=0?`left:50%;`:`right:50%;`}width:${pct}%;background:${v>=0?"var(--teal)":"var(--red)"}"></div></div>
      <span class="v ${v>=0?"teal":"red"}">${v>=0?"+":""}${v.toFixed(1)}</span></div>`;
  }).join("");
}
function spider(avg){
  const cats=["drive","app","short","putt"],W=260,C=W/2,R=95;
  const norm=v=>Math.max(0.06,Math.min(1,(v-(-3))/(1.5-(-3))));
  const pt=(i,f)=>{const a=-Math.PI/2+i*Math.PI/2;return[C+Math.cos(a)*R*f,C+Math.sin(a)*R*f];};
  const poly=cats.map((k,i)=>pt(i,norm(avg[k])).join(",")).join(" ");
  const rings=[0.25,0.5,0.75,1].map(f=>`<polygon points="${cats.map((k,i)=>pt(i,f).join(",")).join(" ")}" fill="none" stroke="var(--line)"/>`).join("");
  const zeroF=norm(0);
  const zero=`<polygon points="${cats.map((k,i)=>pt(i,zeroF).join(",")).join(" ")}" fill="none" stroke="var(--dim)" stroke-dasharray="3 3"/>`;
  const labels=[["Tee",C,16,"middle"],["App",W-4,C+4,"end"],["Short",C,W-6,"middle"],["Putt",4,C+4,"start"]];
  return`<svg width="${W}" height="${W}" viewBox="0 0 ${W} ${W}">${rings}${zero}
    ${cats.map((k,i)=>`<line x1="${C}" y1="${C}" x2="${pt(i,1)[0]}" y2="${pt(i,1)[1]}" stroke="var(--line)"/>`).join("")}
    <polygon points="${poly}" fill="rgba(65,227,187,.22)" stroke="var(--teal)" stroke-width="2"/>
    ${cats.map((k,i)=>{const p=pt(i,norm(avg[k]));return`<circle cx="${p[0]}" cy="${p[1]}" r="4" fill="var(--teal)"/>`;}).join("")}
    ${labels.map(l=>`<text x="${l[1]}" y="${l[2]}" fill="var(--dim)" font-size="11" text-anchor="${l[3]}">${l[0]}</text>`).join("")}
  </svg>`;
}
function trend(vals){
  const W=300,H=90,n=vals.length,mn=Math.min(...vals)-2,mx=Math.max(...vals)+2;
  const x=i=>10+i*(W-20)/Math.max(1,n-1),y=v=>H-10-(v-mn)*(H-20)/(mx-mn);
  const pts=vals.map((v,i)=>`${x(i)},${y(v)}`).join(" ");
  return`<svg width="100%" viewBox="0 0 ${W} ${H}"><polyline points="${pts}" fill="none" stroke="var(--teal)" stroke-width="2"/>
    ${vals.map((v,i)=>`<circle cx="${x(i)}" cy="${y(v)}" r="3" fill="var(--teal)"/><text x="${x(i)}" y="${y(v)-7}" fill="var(--dim)" font-size="9" text-anchor="middle">${v}</text>`).join("")}</svg>`;
}
function drilldowns(){
  const app={"30–100":[], "100–150":[], "150–200":[], "200+":[]};
  const putts={"<6 ft":{n:0,made:0},"6–15 ft":{n:0,made:0},"15–30 ft":{n:0,made:0},"30+ ft":{n:0,made:0}};
  S.rounds.forEach(r=>r.holes.forEach(h=>h.shots.forEach((s,i)=>{
    const cat=catOf(s,h.par);
    const exp=expS(s.lie,s.dist,h.par);
    const nxt=i+1<h.shots.length?expS(h.shots[i+1].lie,h.shots[i+1].dist,h.par):0;
    const sg=exp-nxt-1-(s.pen?1:0);
    if(cat==="app"){const b=s.dist<100?"30–100":s.dist<150?"100–150":s.dist<200?"150–200":"200+";app[b].push(sg);}
    if(cat==="putt"){const holed=i===h.shots.length-1;
      const b=s.dist<6?"<6 ft":s.dist<15?"6–15 ft":s.dist<30?"15–30 ft":"30+ ft";
      putts[b].n++;if(holed)putts[b].made++;}
  })));
  const appRows=Object.keys(app).map(k=>{
    const a=app[k];if(!a.length)return"";
    const v=a.reduce((x,y)=>x+y,0)/a.length;
    return`<div class="bar"><span class="l">${k} yd</span><div class="track">
      <div style="position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--line)"></div>
      <div class="fill" style="${v>=0?"left:50%;":"right:50%;"}width:${Math.min(1,Math.abs(v)/0.5)*50}%;background:${v>=0?"var(--teal)":"var(--red)"}"></div></div>
      <span class="v ${v>=0?"teal":"red"}">${v>=0?"+":""}${v.toFixed(2)}</span></div>`;
  }).join("");
  const puttRows=Object.keys(putts).map(k=>{
    const p=putts[k];if(!p.n)return"";
    return`<div class="bar"><span class="l">${k}</span><div class="track">
      <div class="fill" style="left:0;width:${p.made/p.n*100}%;background:var(--blue)"></div></div>
      <span class="v" style="color:var(--blue)">${Math.round(p.made/p.n*100)}%</span></div>`;
  }).join("");
  let out="";
  if(appRows.trim())out+=`<div class="card"><b>Approach — avg SG per shot</b><div class="mt">${appRows}</div></div>`;
  if(puttRows.trim())out+=`<div class="card"><b>Putting — make % by distance</b><div class="mt">${puttRows}</div></div>`;
  return out;
}

/* ================= BAG ================= */
function vBag(){
  const learned=clubAverages();
  return`<h1 class="title">Bag</h1>
  <div class="card"><b>My bag — carry distances</b><div class="mt">
    ${S.bag.map((b,i)=>`<div class="row mb">
      <input value="${esc(b.name)}" onchange="S.bag[${i}].name=this.value;save()" style="flex:2">
      <input type="number" value="${b.carry}" onchange="S.bag[${i}].carry=+this.value;save()" style="flex:1">
      <span class="dim small" style="width:58px">${learned[b.name]?"📊 "+learned[b.name]:""}</span>
      <button class="btn sm" style="color:var(--red);background:none" onclick="S.bag.splice(${i},1);save();render()">✕</button></div>`).join("")}
    <button class="btn sm mt" onclick="S.bag.push({name:'Club',carry:100});save();render()">+ Add club</button>
    <div class="dim small mt">📊 = your real average from MLM2Pro data + tracked shots (the caddie uses it once it has 3+ samples).</div>
  </div></div>
  <div class="card"><b>Handicap</b>
    <div class="row mt"><span class="dim grow">Used for net scoring &amp; stableford</span>
    <div class="stepper"><button onclick="S.hcap=Math.max(0,S.hcap-1);save();render()">−</button><b>${S.hcap}</b><button onclick="S.hcap=Math.min(54,S.hcap+1);save();render()">+</button></div></div>
  </div>
  <div class="card"><b>Data</b>
    <div class="row mt"><button class="btn grow" onclick="exportData()">⬆ Export backup</button>
    <button class="btn grow" onclick="importData()">⬇ Import</button></div>
    <textarea id="io" class="mt" placeholder="Backup JSON appears / paste here"></textarea>
    <button class="btn mt" style="color:var(--red)" onclick="if(confirm('Erase ALL rounds, MLM2Pro data and settings?')){localStorage.removeItem('tangent_v1');localStorage.removeItem('tangent_course');location.reload();}">Reset everything</button>
  </div>
  <div class="dim small center">Strokes gained vs scratch (Broadie). Course outlines © OpenStreetMap. Imagery © Esri. Weather © Open-Meteo. Personal use only.</div>`;
}
function exportData(){document.getElementById("io").value=JSON.stringify(S);document.getElementById("io").select();
  try{navigator.clipboard.writeText(JSON.stringify(S));alert("Backup copied to clipboard.");}catch(e){}}
function importData(){try{const d=JSON.parse(document.getElementById("io").value);if(!d.bag)throw 0;S=d;S.lm=S.lm||{};S.favs=S.favs||[];save();render();alert("Imported ✓");}catch(e){alert("Paste a valid backup first.");}}

go("golf");
</script>
